   <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    #grid{
  display:grid;
  grid-template-columns:repeat(4,124px);
  /* grid-template-rows:repeat(5,100px); */
  gap:5px;
}

#grid div{
  background:green;
  color:white;
  font-size:20px;
}

#grid div:nth-child(1){
    grid-column:1/5;
}
#grid div:nth-child(2){
    grid-column:1/2;
    grid-row:2/6;
}
#grid div:nth-child(3){
    grid-column:2/3;
    grid-row:2/3;
}
#grid div:nth-child(4){
    grid-column:3/5;
    grid-row:2/3;
}
#grid div:nth-child(5){
    grid-column:2/4;
    grid-row:3/4;
}
#grid div:nth-child(6){
    grid-column:4/5;
    grid-row:3/4;
}
#grid div:nth-child(7){
    grid-column:2/3;
    grid-row:4/5;
}
#grid div:nth-child(8){
    grid-column:3/4;
    grid-row:4/5;
}
#grid div:nth-child(9){
    grid-column:4/5;
    grid-row:4/5;
}
#grid div:nth-child(10){
    grid-column:2/5;
    grid-row:5/6;
}

    </style>
 </head>
 <body>
    <div id="grid">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <div>7</div>
        <div>8</div>
        <div>9</div>
        <div>10</div>
    </div>
    
 </body>
 </html>
